spring.application.name=Mission_Service
server.port=8085

spring.datasource.url=jdbc:h2:mem:mission_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Mission Service application.properties

# Incident Service
incident.service.url=http://localhost:8081/incidents

# Resource Service
resource.service.url=http://localhost:8082/resources

# Rescue Team Service
rescueteam.service.url=http://localhost:8083/rescueteam

# Alert Service
alert.service.url=http://localhost:8084/alerts
